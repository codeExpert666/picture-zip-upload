server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_dataset?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  sql:
    init:
      mode: never

mybatis:
  configuration:
    map-underscore-to-camel-case: true

picture-upload:
  root-path: ${PICTURE_UPLOAD_ROOT:/tmp/picture-upload}
  public-url-prefix: /api/pictures/files
  # 本地样例默认使用内存进度；公司环境可改为 redis。
  progress-store: ${PICTURE_UPLOAD_PROGRESS_STORE:memory}
  import-core-pool-size: 2
  import-max-pool-size: 4
  import-queue-capacity: 64
  io-buffer-size: 1048576
