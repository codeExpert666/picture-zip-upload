server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 128MB
      max-request-size: 128MB
  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/ai_dataset?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  sql:
    init:
      mode: never

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

picture-upload:
  work-root-path: ${PICTURE_UPLOAD_WORK_ROOT:/tmp/picture-upload}
  image-root-path: ${PICTURE_IMAGE_ROOT:/data/pictures}
  public-url-prefix: /api/pictures/files
  # 本地样例默认使用内存进度；公司环境可改为 redis。
  progress-store: ${PICTURE_UPLOAD_PROGRESS_STORE:memory}
  # 业务领域到物理图片表名的白名单映射，不能直接信任前端传入的表名。
  business-area-tables:
    medical: medical_corpus_analysis_picture
  # 旧图片目录只用于保留历史 file_URL 可访问性，新接口上传统一写入 image-root-path。
  legacy-static-locations:
    corpus-images:
      root-path: ${PICTURE_LEGACY_IMAGE_ROOT:/data/corpusImages}
      public-url-prefix: /corpusImages
  import-core-pool-size: 2
  import-max-pool-size: 4
  import-queue-capacity: 64
  io-buffer-size: 1048576
