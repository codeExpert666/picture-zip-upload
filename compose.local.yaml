services:
  mysql:
    image: ${MYSQL_IMAGE:-mysql:5.7.44@sha256:4bc6bc963e6d8443453676cae56536f4b8156d78bae03c0145cbe47c2aad73bb}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-change-me}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_dataset}
      MYSQL_USER: ${MYSQL_USERNAME:-picture_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-app-change-me}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-allowed-packet=256M
    ports:
      - 127.0.0.1:${MYSQL_EXPOSED_PORT:-3307}:3306
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping --host=127.0.0.1 --user=root --password=\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 20
    restart: unless-stopped
    networks:
      - application

  redis:
    image: ${REDIS_IMAGE:-redis:5.0.14-bullseye@sha256:fc5ecd863862f89f04334b7cbb57e93c9790478ea8188a49f6e57b0967d38c75}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-redis-change-me}
    command: >-
      sh -c 'exec redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    ports:
      - 127.0.0.1:${REDIS_EXPOSED_PORT:-6380}:6379
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      start_period: 10s
      retries: 10
    restart: unless-stopped
    networks:
      - application

  backend:
    environment:
      SERVER_PORT: 8080
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_dataset}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      MYSQL_USERNAME: ${MYSQL_USERNAME:-picture_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-app-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-redis-change-me}
      PICTURE_UPLOAD_PROGRESS_STORE: redis
      PICTURE_UPLOAD_WORK_ROOT: /data/picture-upload-work
      PICTURE_IMAGE_ROOT: /data/pictures
      PICTURE_LEGACY_IMAGE_ROOT: /data/corpusImages
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - 127.0.0.1:${BACKEND_PORT:-8080}:8080
    volumes:
      - upload-work:/data/picture-upload-work
      - pictures:/data/pictures
      - legacy-pictures:/data/corpusImages:ro
    networks:
      - application

  maintenance:
    environment:
      MYSQL_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ai_dataset}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      MYSQL_USERNAME: ${MYSQL_USERNAME:-picture_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-local-app-change-me}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-local-redis-change-me}
      PICTURE_UPLOAD_PROGRESS_STORE: redis
      PICTURE_UPLOAD_WORK_ROOT: /data/picture-upload-work
      PICTURE_IMAGE_ROOT: /data/pictures
      PICTURE_LEGACY_IMAGE_ROOT: /data/corpusImages
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - upload-work:/data/picture-upload-work
      - pictures:/data/pictures
      - legacy-pictures:/data/corpusImages:ro
    networks:
      - application

networks:
  application:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  upload-work:
  pictures:
  legacy-pictures:
